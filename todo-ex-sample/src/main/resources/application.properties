spring.application.name=todo-ex-sample
# DataSource: compose.yaml で起動する PostgreSQL コンテナ内の todo_ex_sample DB
spring.datasource.url=jdbc:postgresql://localhost:5432/todo_ex_sample
spring.datasource.username=todo
spring.datasource.password=todo
spring.datasource.driver-class-name=org.postgresql.Driver

# MyBatis: Mapper XML は classpath:mybatis.mapper/*.xml 配下に置く (todo-sample 流儀に合わせる)
mybatis.mapper-locations=classpath:mybatis.mapper/*.xml

# Mapper の SQL ログを開発時に出すため
logging.level.com.example.todo_ex_sample.todo.infrastructure=DEBUG
