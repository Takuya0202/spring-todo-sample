services:
  postgres:
    image: postgres:16-alpine
    container_name: spring-todo-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
      POSTGRES_DB: postgres
      TZ: Asia/Tokyo
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
